apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: status-aggregator
  namespace: status-aggregator
spec:
  parentRefs:
    - name: local-gateway
      namespace: envoy-gateway-system
  hostnames:
    - dev-overview.orb.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: status-aggregator
          port: 8080
